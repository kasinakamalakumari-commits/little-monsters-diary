<!DOCTYPE html>
<html>
<head>
<title>Little Monster's Diary 🌸</title>

<style>
body{
margin:0;
background-attachment: fixed;
font-family: "Trebuchet MS", sans-serif;
background: linear-gradient(#ffe6f2,#efe4ff);
overflow-x:hidden;
text-align:center;
color:#666;
}

.cloud{
position:absolute;
font-size:40px;
animation: float 10s infinite alternate;
}

.c1{top:40px;left:10%;}
.c2{top:100px;right:15%;}
.h1{top:250px;left:5%;}
.h2{top:500px;right:8%;}

.floating{
position:absolute;
font-size:30px;
animation: float 8s infinite alternate;
}
@keyframes float{
from{transform:translateX(0);}
to{transform:translateX(30px);}
}

header{
padding:50px;
}

h1{
color:#ff6eb4;
font-size:45px;
}

.card{
background:
repeating-linear-gradient(
white,
white 28px,
#ffd6e8 29px
);
margin:20px auto;
width:85%;
padding:25px;
border-radius:25px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.heart{
font-size:30px;
animation: heartbeat 1.5s infinite;
}

@keyframes heartbeat{
50%{transform:scale(1.2);}
}
</style>
</head>

<body>

<div class="cloud c1">☁️⭐</div>
<div class="cloud c2">☁️🌸</div>
<div class="cloud" style="top:180px;left:30%;">⭐✨</div>
<div class="cloud" style="top:350px;right:25%;">🌙⭐</div>
<div class="cloud" style="top:600px;left:70%;">✨🌸</div>
<div class="floating h1">💖</div>
<div class="floating h2">🌸</div>
<header>
<h1>🐻 Little Monster's Diary 🌸</h1>
<p>Every memory deserves a special place ✨</p>
</header>

<div class="card">
<h2>📖 My Diary</h2>

<textarea id="diary"
rows="10"
style="width:90%; border-radius:15px; padding:15px; font-size:16px;">
</textarea>

<script>
const diary = document.getElementById("diary");

// Load saved text
diary.value = localStorage.getItem("myDiary") || "";

// Save automatically
diary.addEventListener("input", () => {
  localStorage.setItem("myDiary", diary.value);
});
</script>

</div>

<div class="card">
<div class="card">
<h2>🌷 Memory Wall</h2>
<textarea id="memoryWall" rows="6"
style="width:90%;border-radius:15px;padding:15px;"></textarea>
</div>

<div class="card">
<h2>📸 Photo Album</h2>
<textarea id="photoAlbum" rows="6"
style="width:90%;border-radius:15px;padding:15px;"></textarea>
</div>

<div class="card">
<h2>🌸 My Favorite Things</h2>
<textarea id="favoriteThings" rows="6"
style="width:90%;border-radius:15px;padding:15px;"></textarea>
</div>

<div class="card">
<h2>💖 Message Box</h2>
<textarea id="messageBox" rows="6"
style="width:90%;border-radius:15px;padding:15px;"></textarea>
</div>

<script>
["memoryWall","photoAlbum","favoriteThings","messageBox"]
.forEach(id => {
const box = document.getElementById(id);
box.value = localStorage.getItem(id) || "";
box.addEventListener("input", () => {
localStorage.setItem(id, box.value);
});
});
</script>
<p>Thank you for visiting Little Monster's Diary!</p>
</div>
<div class="card">
<h2>💌 Secret Diary</h2>
</div>
<div class="card">
<h2>📅 Monthly Diaries</h2>

<a href="june2026.html">
<button style="background:#d8b4ff;padding:15px 25px;border:none;border-radius:20px;margin:10px;">
🌸 June 2026
</button>
</a>
<a href="secret.html">
<button style="background:#ffb6d9;padding:15px 25px;border:none;border-radius:20px;">
Open Secret Diary 🌸
</button>
</a>
</div>
